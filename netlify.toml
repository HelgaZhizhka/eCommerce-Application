# Build settings live in the repo now (overrides Netlify UI settings).
[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Local dev: `npx netlify dev` fronts Vite (3000) + functions on :8888.
[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  autoLaunch = false
  # read redirects from public/, not from a (possibly stale) build/ output
  publish = "public"
