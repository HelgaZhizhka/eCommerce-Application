name: E2E

# Runs Playwright against the Netlify deploy that just went live, using its URL —
# no Commercetools env/secrets in GitHub (the preview already has them on Netlify).
#
# ⚠️ DORMANT (verified 2026-06-20, after the develop→main cutover): this Netlify
# site reports deploys as commit `status` events (context
# `netlify/yes-code-merch/deploy-preview`, with target_url), NOT GitHub
# `deployment_status` / Deployment objects — so this `on: deployment_status`
# workflow never fires here. By project decision e2e stays LOCAL
# (`./scripts/verify.sh` / `npx playwright test`, validated 11/11 against the real
# preview); the per-PR CI `verify` job covers types/lint/unit/build. To wire this
# up later: switch to `on: status`, guard on the Netlify context +
# `state == 'success'`, and point Playwright at `github.event.target_url`.
on:
  deployment_status:

jobs:
  e2e:
    # only after a Netlify deploy succeeds; target_url is that deploy's URL
    if: ${{ github.event.deployment_status.state == 'success' && github.event.deployment_status.target_url != '' }}
    runs-on: ubuntu-latest
    steps:
      # check out the exact commit that was deployed (carries the matching
      # playwright.config); for deployment_status the SHA is on the deployment.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright) against the deployed URL
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
