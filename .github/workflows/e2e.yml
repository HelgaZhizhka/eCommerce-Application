name: E2E

# Runs Playwright against the Netlify deploy that just went live, using its URL —
# no Commercetools env/secrets in GitHub (the preview already has them on Netlify).
#
# NOTE: `deployment_status`-triggered workflows only run from the repository's
# DEFAULT branch. With `main` as default and `develop` as the working branch,
# this activates once it lands on `main` (the final merge) and for `main` PRs.
# During day-to-day `develop` work, e2e runs locally (./scripts/verify.sh) and
# the CI `verify` job (build/lint/typecheck/unit) covers each PR.
# Requires Netlify Deploy Previews to be enabled for the repo.
on:
  deployment_status:

jobs:
  e2e:
    # only after a Netlify deploy succeeds; target_url is that deploy's URL
    if: ${{ github.event.deployment_status.state == 'success' && github.event.deployment_status.target_url != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright) against the deployed URL
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
